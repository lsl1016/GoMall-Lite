version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: gomall-lite-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: gomall_lite
      MYSQL_USER: gomall
      MYSQL_PASSWORD: gomall123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./gomall-lite-api
    container_name: gomall-lite-api
    restart: unless-stopped
    environment:
      APP_PORT: "8080"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: gomall
      MYSQL_PASSWORD: gomall123
      MYSQL_DATABASE: gomall_lite
      JWT_SECRET: gomall-lite-secret
      GIN_MODE: release
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./gomall-lite-web
    container_name: gomall-lite-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
